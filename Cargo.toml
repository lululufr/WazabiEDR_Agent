[package]
name = "WazabiEDR_Agent"
version = "0.1.0"
edition = "2024"

[dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Security_Authorization",
    "Win32_Security_Cryptography",
    "Win32_Security_WinTrust",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_Pipes",
    "Win32_System_Threading",
    "Win32_System_ProcessStatus",
    "Win32_System_Time",
    "Win32_System_SystemInformation",
    "Win32_System_Console",
    # Services API for the persistence polling loop (EnumServicesStatusExW
    # + QueryServiceConfigW). No new transitive crates — features only
    # gate which bindings get generated by the windows-sys macro expansion.
    "Win32_System_Services",
] }
# Used by the spool writer to compress sealed batches before they sit on
# disk waiting to be uploaded. Pure Rust API over zstd-sys.
zstd = "0.13"

# Plugin telemetry uses JSON on the wire because (a) plugin payloads are
# arbitrary author-defined documents — hand-rolling a parser for arbitrary
# nested input is not viable, and (b) every language has a JSON client, so
# any third-party plugin can talk to us without a custom SDK.
#
# The hot kernel-event path (driver → agent → spool) stays dependency-free
# binary; serde only touches the plugin sub-system.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Tiny synchronous HTTP client for the shipper. Picked over reqwest+tokio
# because the rest of the agent uses explicit blocking threads (driver
# pump, plugin acceptor, spool writer) — introducing an async runtime
# just for the shipper would add ~50 transitive crates to the EDR's
# supply chain for one outbound POST loop. rustls-tls backend (default
# in 2.x) keeps us off OpenSSL/Schannel.
ureq = { version = "2", default-features = false, features = ["tls"] }

# ETW (Event Tracing for Windows) consumer. Lets the agent subscribe to
# OS-native providers (DNS-Client, TCPIP, PowerShell script-block, WMI,
# Schannel, AMSI) and turn them into Wazabi events without writing a
# second kernel driver. ferrisetw is the de-facto Rust binding — wraps
# StartTrace/OpenTrace/ProcessTrace + TDH property parsing. We use the
# session_realtime feature only; no kernel logger session needed.
ferrisetw = "1.2"

# Windows Service Control Manager handshake. Lets the same binary run
# either as a real Win32 service (StartServiceCtrlDispatcher path) or
# as a foreground console process (transparent fallback when the
# dispatcher refuses with ERROR_FAILED_SERVICE_CONTROLLER_CONNECT).
# Production posture is the service path; dev runs are usually console.
windows-service = "0.7"

# Pure rule engine (.waza DSL parser, AST, evaluator). Vit dans un
# repo séparé (github.com/lululufr/WazabiEDR_WazaCore) pour être
# consommé aussi par WazabiEDR_Utils/wedr-waza-check.
#
# Dev local (patch le remote vers le dossier sibling) — mettre dans
# `.cargo/config.toml` GITIGNORÉ :
#   [patch."https://github.com/lululufr/WazabiEDR_WazaCore.git"]
#   wedr-waza-core = { path = "../WazabiEDR_WazaCore" }
wedr-waza-core = { git = "https://github.com/lululufr/WazabiEDR_WazaCore.git", tag = "v0.1.0" }

# Smaller, faster, no-debug-info release builds. `panic = "abort"` keeps
# us in line with the driver's panic policy and removes the unwinding
# tables; `lto = "thin"` and `codegen-units = 1` give the linker the
# whole-program view it needs for cross-crate inlining; `strip = true`
# trims symbols out of the final EXE.
[profile.release]
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
